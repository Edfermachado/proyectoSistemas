services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: payload_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - payload_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URI=${DATABASE_URI}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
    ports:
      - "3000:3000"
    volumes:
      # Aislamiento de medios locales, preparado para futura abstracción a S3
      - ./media:/app/media
    depends_on:
      - db
    networks:
      - payload_network

volumes:
  pgdata:

networks:
  payload_network:
    driver: bridge
